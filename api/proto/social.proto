syntax = "proto3";

package social;

option go_package = "kairos/api/socialpb";

// Social 服务（供 Feed 等下游服务 RPC 调用）
service SocialService {
  // GetFollowingIDs 获取某用户关注的用户 ID 列表
  rpc GetFollowingIDs(GetFollowingIDsRequest) returns (GetFollowingIDsResponse);
}

message GetFollowingIDsRequest {
  uint32 follower_id = 1;  // 关注者（follower）的 account_id
}

message GetFollowingIDsResponse {
  repeated uint32 following_ids = 1;
}
