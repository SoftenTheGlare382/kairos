# Kairos 动态配置文件
# 支持 ${VAR} 引用 config.env / 环境变量
# 加载顺序：config.env -> 环境变量 -> YAML 默认值


database:
  host: ${DB_HOST:-127.0.0.1}
  port: ${DB_PORT:-3306}
  user: ${DB_USER:-root}
  password: ${DB_PASSWORD:-root}
  dbname: ${DB_NAME:-kairos_db}

redis:
  host: ${REDIS_HOST:-127.0.0.1}
  port: ${REDIS_PORT:-6379}
  password: ${REDIS_PASSWORD:-}
  db: ${REDIS_DB:-0}

rabbitmq:
  url: ${RABBITMQ_URL:-amqp://guest:guest@127.0.0.1:5672/}

# Worker 配置
worker:
  sync_interval_min: ${WORKER_SYNC_INTERVAL_MIN:-5}  # 全量同步间隔（分钟），0=仅启动时同步

jwt:
  secret_key: ${JWT_SECRET:-change-me-in-env}
  token_timeout: 1440  # 单位：分钟，1440=24h


server:
  account_port: ${ACCOUNT_SERVER_PORT:-8081}       # Account HTTP 端口
  account_grpc_port: ${ACCOUNT_GRPC_PORT:-9081}    # Account gRPC 端口（服务间 RPC）
  video_port: ${VIDEO_SERVER_PORT:-8082}           # Video HTTP 端口
  video_grpc_port: ${VIDEO_GRPC_PORT:-9082}       # Video gRPC 端口（Feed 调用）
  social_port: ${SOCIAL_SERVER_PORT:-8083}         # Social HTTP 端口
  social_grpc_port: ${SOCIAL_GRPC_PORT:-9083}     # Social gRPC 端口（Feed 调用）
  feed_port: ${FEED_SERVER_PORT:-8084}            # Feed HTTP 端口
  im_port: ${IM_SERVER_PORT:-8085}                # IM HTTP/WebSocket 端口
  gin_mode: ${GIN_MODE:-debug}             # debug | release | test
# Video 等下游服务调用 Account 的地址
account:
  base_url: ${ACCOUNT_SERVICE_URL:-http://127.0.0.1:8081}
  grpc_addr: ${ACCOUNT_GRPC_ADDR:-127.0.0.1:9081}  # gRPC 地址（服务间调用）

# Social 服务配置
social:
  account_grpc_addr: ${ACCOUNT_GRPC_ADDR:-127.0.0.1:9081}  # Social 调用 Account gRPC 的地址

# Feed 服务配置（无独立 DB，依赖 Video、Social gRPC）
feed:
  video_grpc_addr: ${FEED_VIDEO_GRPC_ADDR:-127.0.0.1:9082}
  social_grpc_addr: ${FEED_SOCIAL_GRPC_ADDR:-127.0.0.1:9083}

# IM 服务配置（依赖 Account、Social gRPC）
im:
  account_grpc_addr: ${IM_ACCOUNT_GRPC_ADDR:-127.0.0.1:9081}
  social_grpc_addr: ${IM_SOCIAL_GRPC_ADDR:-127.0.0.1:9083}
  meilisearch:
    host: ${MEILISEARCH_HOST:-}      # 留空禁用，与 Video 共用同一 Meilisearch
    api_key: ${MEILISEARCH_API_KEY:-}
    index: ${IM_MEILISEARCH_INDEX:-im_messages}
  meilisearch_sync_interval: ${IM_MEILISEARCH_SYNC_INTERVAL:-5}  # MySQL→Meilisearch 全量同步间隔（分钟），0=仅启动时

# Video 服务配置
video:
  account_grpc_addr: ${ACCOUNT_GRPC_ADDR:-127.0.0.1:9081}  # Video 调用 Account gRPC 的地址
  meilisearch:
    host: ${MEILISEARCH_HOST:-}   # 留空则禁用搜索，如 http://127.0.0.1:7700
    api_key: ${MEILISEARCH_API_KEY:-}
    index: ${MEILISEARCH_INDEX:-videos}
  storage:
    type: ${VIDEO_STORAGE_TYPE:-local}   # local | qiniu，动态切换存储方式
    local:
      upload_dir: ${VIDEO_LOCAL_UPLOAD_DIR:-.run/uploads}
      static_prefix: ${VIDEO_LOCAL_STATIC_PREFIX:-/static}
    qiniu:
      access_key: ${QINIU_ACCESS_KEY:-}
      secret_key: ${QINIU_SECRET_KEY:-}
      bucket: ${QINIU_BUCKET:-}
      domain: ${QINIU_DOMAIN:-}
      zone: ${QINIU_ZONE:-z0}
