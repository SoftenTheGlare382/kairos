# Kairos 动态配置文件
# 支持 ${VAR} 引用 config.env / 环境变量
# 加载顺序：config.env -> 环境变量 -> YAML 默认值

server:
  port: ${SERVER_PORT:-8081}
  gin_mode: ${GIN_MODE:-debug}  # debug | release | test

database:
  host: ${DB_HOST:-127.0.0.1}
  port: ${DB_PORT:-3306}
  user: ${DB_USER:-root}
  password: ${DB_PASSWORD:-root}
  dbname: ${DB_NAME:-kairos_db}

redis:
  host: ${REDIS_HOST:-127.0.0.1}
  port: ${REDIS_PORT:-6379}
  password: ${REDIS_PASSWORD:-}
  db: ${REDIS_DB:-0}

jwt:
  secret_key: ${JWT_SECRET:-change-me-in-env}
  token_timeout: 24 * 60 #minutes  # 24h | 1h | 10m
